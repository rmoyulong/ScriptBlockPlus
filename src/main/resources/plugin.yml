name: ScriptBlockPlus
main: com.github.yuttyann.scriptblockplus.ScriptBlock
version: 2.5.0
description: ${project.description} | §a[Folia Compatible]§r - Full support for Folia regionized threading
author: yuttyann44581
website: https://github.com/chenasyd/ScriptBlockPlus 
api-version: 1.13
folia-supported: true
loadbefore: [ScriptEntityPlus]
softdepend: [Vault, ScriptBlock, DiscordSRV, PlaceholderAPI, MythicMobs]

commands:
  scriptblockplus:
    description: ScriptBlockPlus Commands
    aliases: [sbp]
    usage: |
           /<command> tool - Displays the auxiliary tool select window.
           /<command> reload - Reload the plugin.
           /<command> backup - Make a backup of the plugin data.
           /<command> datamigr - Migrate old data from ScriptBlock to ScriptBlockPlus.
           /<command> <scriptkey> create <options> - Create a new script to the block.
           /<command> <scriptkey> add <options> - Add a new script to the block.
           /<command> <scriptkey> remove - Remove the script from the block.
           /<command> <scriptkey> view - View the script for the block.
           /<command> <scriptkey> nametag [tag] - Set a nametag for the block.
           /<command> <scriptkey> redstone [repeat] [filter] [selector] - Set if the script works with Redstone.
           /<command> <scriptkey> run [player] <world> <x> <y> <z> - Execute the specified script.
           /<command> selector paste [pasteonair] [overwrite] - Paste the script into the selection.
           /<command> selector remove - Remove the script into the selection.
  dungeonchest:
    description: Dungeon Chest Management Commands
    aliases: [dc, dchest]
    usage: |
           /<command> create <config-name> - Create a dungeon chest (looking at chest).
           /<command> remove - Remove a dungeon chest (looking at chest).
           /<command> list - List all active dungeon chests.
           /<command> info - Show info about targeted chest.
           /<command> reload - Reload configuration (admin).
           /<command> refresh - Manually refresh targeted chest (admin).
  mobspawn:
    description: Dungeon Mob Spawn Point Management Commands
    aliases: [ms]
    usage: |
           /<command> create <name> - Create a mob spawn point.
           /<command> remove - Remove a mob spawn point.
           /<command> addmob <type> [weight] [prob%] [name] - Add mob config.
           /<command> removemob <index> - Remove mob config.
           /<command> listmobs - List mob configs.
           /<command> set <param> <value> - Set parameters.
           /<command> list - List all spawn points.
           /<command> info - Show spawn point info.
           /<command> killmobs - Kill all spawned mobs.
           /<command> reload - Reload configuration.
           /<command> save - Save data.

permissions:
  scriptblockplus.*:
    default: op
    children:
      scriptblockplus.option.*: true
      scriptblockplus.command.*: true
      scriptblockplus.tool.*: true
      scriptblockplus.interact.use: true
      scriptblockplus.break.use: true
      scriptblockplus.walk.use: true
      scriptblockplus.hit.use: true
  scriptblockplus.option.*:
    default: op
  scriptblockplus.command.*:
    default: op
    children:
      scriptblockplus.command.tool: true
      scriptblockplus.command.reload: true
      scriptblockplus.command.backup: true
      scriptblockplus.command.datamigr: true
      scriptblockplus.command.interact: true
      scriptblockplus.command.break: true
      scriptblockplus.command.walk: true
      scriptblockplus.command.hit: true
      scriptblockplus.command.selector: true
  scriptblockplus.tool.*:
    default: op
    children:
      scriptblockplus.tool.scripteditor: true
      scriptblockplus.tool.scriptviewer: true
      scriptblockplus.tool.scriptmanager: true
      scriptblockplus.tool.blockselector: true
  scriptblockplus.command.tool:
    default: false
  scriptblockplus.command.reload:
    default: false
  scriptblockplus.command.backup:
    default: false
  scriptblockplus.command.datamigr:
    default: false
  scriptblockplus.command.interact:
    default: false
  scriptblockplus.command.break:
    default: false
  scriptblockplus.command.walk:
    default: false
  scriptblockplus.command.hit:
    default: false
  scriptblockplus.command.selector:
    default: false
  scriptblockplus.interact.use:
    default: true
  scriptblockplus.break.use:
    default: true
  scriptblockplus.walk.use:
    default: true
  scriptblockplus.hit.use:
    default: true
  scriptblockplus.tool.scripteditor:
    default: false
  scriptblockplus.tool.scriptviewer:
    default: false
  scriptblockplus.tool.scriptmanager:
    default: false
  scriptblockplus.tool.blockselector:
    default: false
  scriptblockplus.dungeonchest.*:
    default: op
    children:
      scriptblockplus.dungeonchest.create: true
      scriptblockplus.dungeonchest.remove: true
      scriptblockplus.dungeonchest.list: true
      scriptblockplus.dungeonchest.info: true
  scriptblockplus.dungeonchest.admin:
    default: op
  scriptblockplus.dungeonchest.create:
    default: op
  scriptblockplus.dungeonchest.remove:
    default: op
  scriptblockplus.dungeonchest.elite:
    default: false
  scriptblockplus.mobspawn.*:
    default: op
    children:
      scriptblockplus.mobspawn.create: true
      scriptblockplus.mobspawn.remove: true
      scriptblockplus.mobspawn.list: true
      scriptblockplus.mobspawn.info: true
      scriptblockplus.mobspawn.admin: true
  scriptblockplus.mobspawn.admin:
    default: op
  scriptblockplus.mobspawn.create:
    default: op
  scriptblockplus.mobspawn.remove:
    default: op